<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | QR Dynamic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .card { background-color: #1E293B; border: 1px solid #334155; border-radius: 0.75rem; }
        .badge-green { background-color: #064E3B; color: #6EE7B7; }
        .badge-blue { background-color: #1E3A8A; color: #93C5FD; }
        .badge-red { background-color: #7F1D1D; color: #FCA5A5; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Top Nav -->
    <nav class="border-b border-slate-800 bg-[#0F172A] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 text-[#F97316] font-bold text-lg">
                <i class="ph-fill ph-qr-code text-2xl"></i>
                QR Dynamic
            </div>
            <div class="flex items-center gap-6 text-sm text-slate-300">
                <div class="flex items-center gap-2">
                    <i class="ph ph-squares-four"></i> Admin
                </div>
                <button onclick="logout()" class="flex items-center gap-2 text-red-400 hover:text-red-300 transition">
                    <i class="ph ph-sign-out"></i> Sair
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl mx-auto w-full p-6 mt-4">
        <div id="access-denied" class="hidden text-center py-20 text-red-400">
            <h2 class="text-2xl font-bold">Acesso Negado</h2>
            <p>Você não tem permissão para acessar esta página.</p>
        </div>

        <div id="admin-content" class="hidden space-y-8">
            <!-- Header -->
            <div class="flex justify-between items-end">
                <div>
                    <div class="flex items-center gap-3 mb-1">
                        <i class="ph-fill ph-qr-code text-3xl text-[#F97316]"></i>
                        <h1 class="text-3xl font-bold text-white">Painel Administrativo</h1>
                    </div>
                    <p class="text-slate-400 ml-11">Gerencie QR codes e usuários</p>
                </div>
                <button id="btn-generate" class="bg-[#F97316] hover:bg-[#EA580C] text-white rounded-lg py-2.5 px-5 font-semibold transition flex items-center gap-2">
                    <i class="ph ph-plus font-bold"></i> Criar QR Code
                </button>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="card p-5">
                    <div class="text-sm text-slate-400 mb-2">Total de QR Codes</div>
                    <div class="text-3xl font-bold text-white" id="stat-total">0</div>
                </div>
                <div class="card p-5">
                    <div class="text-sm text-slate-400 mb-2">Reivindicados</div>
                    <div class="text-3xl font-bold text-green-400" id="stat-claimed">0</div>
                </div>
                <div class="card p-5">
                    <div class="text-sm text-slate-400 mb-2">Disponíveis</div>
                    <div class="text-3xl font-bold text-[#F97316]" id="stat-available">0</div>
                </div>
                <div class="card p-5">
                    <div class="text-sm text-slate-400 mb-2 flex items-center gap-2">
                        <i class="ph ph-trend-up"></i> Total de Scans
                    </div>
                    <div class="text-3xl font-bold text-[#F97316]" id="stat-scans">0</div>
                </div>
            </div>

            <!-- Table -->
            <div class="card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="border-b border-slate-700 text-slate-400">
                                <th class="p-4 font-medium">Código Único</th>
                                <th class="p-4 font-medium">Status</th>
                                <th class="p-4 font-medium">Proprietário</th>
                                <th class="p-4 font-medium">URL de Redirecionamento</th>
                                <th class="p-4 font-medium">Scans</th>
                                <th class="p-4 font-medium">Data de Reivindicação</th>
                                <th class="p-4 font-medium">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="codes-list" class="divide-y divide-slate-700/50">
                            <!-- Rows will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/app.js"></script>
    <script>
        async function initAdmin() {
            try {
                const user = await getCurrentUser();
                if (!user) {
                    window.location.href = '/index.html';
                    return;
                }
                if (user.profile?.role !== 'admin') {
                    document.getElementById('access-denied').classList.remove('hidden');
                    
                    // Adiciona um botão para o usuário voltar se não for admin
                    const backBtn = document.createElement('button');
                    backBtn.className = "mt-6 bg-slate-700 hover:bg-slate-600 px-6 py-2.5 rounded-lg text-sm transition font-medium";
                    backBtn.textContent = "Ir para meu Dashboard";
                    backBtn.onclick = () => window.location.href = '/dashboard.html';
                    document.getElementById('access-denied').appendChild(backBtn);
                    return;
                }

                document.getElementById('admin-content').classList.remove('hidden');
                loadCodes();
            } catch (err) {
                console.error("Error in initAdmin:", err);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'text-center py-20 text-red-400';
                errorDiv.innerHTML = `<h2 class="text-2xl font-bold">Erro Interno</h2><p>${err.message}</p>`;
                document.querySelector('main').appendChild(errorDiv);
            }
        }

        async function loadCodes() {
            // Fetch QR codes and join with profiles to get owner name
            const { data, error } = await window.supabaseClient
                .from('qrcodes')
                .select('*, profiles(full_name)')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            const tbody = document.getElementById('codes-list');
            tbody.innerHTML = '';
            
            let total = data.length;
            let claimed = 0;
            let available = 0;
            let scans = 0;

            data.forEach(qr => {
                scans += (qr.scan_count || 0);
                if (qr.status === 'disponivel') available++;
                else claimed++;

                const activationLink = `${window.location.origin}/ativar/${qr.code}`;
                const isClaimed = qr.status !== 'disponivel';
                
                const ownerName = qr.profiles?.full_name || '-';
                const ownerHtml = isClaimed ? `<div class="flex items-center gap-1 text-[#F97316]"><i class="ph ph-eye"></i> ${ownerName}</div>` : '-';
                
                const targetUrl = qr.target_url ? `<a href="${qr.target_url}" target="_blank" class="text-[#F97316] hover:underline truncate max-w-[200px] block">${qr.target_url}</a>` : '<span class="text-slate-500">Não configurado</span>';
                
                const claimDate = isClaimed ? new Date(qr.updated_at || qr.created_at).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }) : '-';

                const badgeClass = qr.status === 'disponivel' ? 'badge-blue' : (qr.status === 'ativo' ? 'badge-green' : 'badge-green'); // Base44 shows "Reivindicado" as green
                const statusText = qr.status === 'disponivel' ? 'Disponível' : 'Reivindicado';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/30 transition";
                tr.innerHTML = `
                    <td class="p-4">
                        <div class="font-mono font-bold text-[#F97316] cursor-pointer hover:underline" onclick="navigator.clipboard.writeText('${activationLink}'); alert('Link copiado!')" title="Copiar Link de Ativação">
                            ${qr.code}
                        </div>
                    </td>
                    <td class="p-4">
                        <span class="px-2.5 py-1 rounded-md text-xs font-medium ${badgeClass}">${statusText}</span>
                    </td>
                    <td class="p-4">${ownerHtml}</td>
                    <td class="p-4">${targetUrl}</td>
                    <td class="p-4 flex items-center gap-1"><i class="ph ph-trend-up text-slate-500"></i> ${qr.scan_count || 0}</td>
                    <td class="p-4 text-slate-400">${claimDate}</td>
                    <td class="p-4">
                        <button class="bg-slate-800 text-slate-500 px-3 py-1.5 rounded text-xs flex items-center gap-1 cursor-not-allowed border border-slate-700" disabled>
                            <i class="ph ph-link-break"></i> Desativar
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-claimed').textContent = claimed;
            document.getElementById('stat-available').textContent = available;
            document.getElementById('stat-scans').textContent = scans;
        }

        function generateRandomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 5; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        document.getElementById('btn-generate').addEventListener('click', async () => {
            const code = generateRandomCode();
            const btn = document.getElementById('btn-generate');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Gerando...';

            const { error } = await window.supabaseClient
                .from('qrcodes')
                .insert([{ code: code, status: 'disponivel' }]);

            btn.disabled = false;
            btn.innerHTML = originalText;

            if (error) {
                alert("Erro ao gerar código: " + error.message);
            } else {
                loadCodes();
            }
        });

        initAdmin();
    </script>
</body>
</html>
